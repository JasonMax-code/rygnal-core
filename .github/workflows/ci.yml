name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-quality:
    name: Test and quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Rust format check
        run: cargo fmt --manifest-path rust-kernel/Cargo.toml -- --check

      - name: Rust tests
        run: cargo test --manifest-path rust-kernel/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path rust-kernel/Cargo.toml -- -D warnings

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest -q

      - name: Bandit security scan
        run: bandit -r src demo -c pyproject.toml

      - name: Dependency vulnerability audit
        run: pip-audit -r requirements-dev.txt
